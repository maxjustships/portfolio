<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Max | 10x Web Developer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            orange: '#f97316',
                            blue: '#0ea5e9',
                        }
                    },
                    fontFamily: {
                        serif: ['Fraunces', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .stencil-text {
            position: relative;
            display: inline-block;
        }
        .stencil-text::after {
            content: "";
            position: absolute;
            inset: 0;
            background-image: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.4) 2px,
                rgba(0,0,0,0.4) 4px
            );
            pointer-events: none;
        }
        .neo-brutalism-card {
            box-shadow: 6px 6px 0px 0px #ffffff;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }
        .neo-brutalism-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0px 0px #ffffff;
        }
        .neo-brutalism-button-orange {
            box-shadow: 4px 4px 0px 0px #000;
        }
        .neo-brutalism-button-orange:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px 0px #000;
        }
        .project-description a {
            color: #f97316; /* brand-orange */
            text-decoration: underline;
            text-decoration-thickness: 2px;
            text-underline-offset: 4px;
            font-weight: 900;
            transition: all 0.2s ease;
        }
        .project-description a:hover {
            background-color: #f97316;
            color: #000;
        }
        .tag-pill {
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .tag-pill.active {
            background-color: #f97316;
            color: #000;
            border-color: #f97316;
        }
        .portrait-background {
            position: absolute;
            top: 2rem;
            right: 0px;
            max-height: 700px;
            height: 50%;
            width: 100%;
            background: #fff;
            z-index: -1;
            mask-image: url('assets/photo.png');
            -webkit-mask-image: url('assets/photo.png');

            mask-position: top right;
            -webkit-mask-position: top right;
            mask-size: contain;
            -webkit-mask-size: contain;
            mask-repeat: no-repeat;
            -webkit-mask-repeat: no-repeat;
            pointer-events: none;
            opacity: 0.4;
        }
    </style>
</head>
<body class="bg-black text-white font-serif selection:bg-brand-orange selection:text-black min-h-screen">

    <div class="max-w-4xl mx-auto px-6 py-20 relative">
        <div class="portrait-background"></div>
        <!-- Header -->
        <header class="mb-24 space-y-4">
            <h1 class="text-6xl md:text-8xl font-black uppercase tracking-tighter leading-none italic">
                <span class="stencil-text">Max</span>
            </h1>
            <p class="text-2xl md:text-3xl font-bold border-l-8 border-brand-orange pl-6 py-2">
                10x Web Developer. <br>
                <span class="text-brand-blue uppercase">I just ship things.</span>
            </p>
        </header>

        <!-- Projects Grid -->
        <section>
            <div class="flex flex-col mb-12 gap-8">
                <h2 class="text-3xl font-black uppercase inline-block bg-white text-black px-4 py-1 -rotate-1 self-start">
                    Selected Works
                </h2>
                
                <div id="tags-filter" class="flex flex-col gap-4 items-center md:items-end">
                    <!-- Dynamic categories and tags will be injected here -->
                </div>
            </div>
            
            <div id="projects-container" class="grid gap-12">
                <!-- Projects will be injected here -->
            </div>
        </section>

        <!-- Footer -->
        <footer class="mt-32 pt-12 border-t-2 border-white/20 flex flex-col md:flex-row justify-between items-start gap-8">
            <div>
                <p class="text-xl font-bold opacity-50">Build. Ship. Repeat.</p>
                <p class="text-sm uppercase tracking-widest mt-2">© 2026 Max / Raw Power</p>
            </div>
            <div class="flex gap-4">
                 <a id="email-link" href="#" class="bg-brand-orange text-black font-black px-4 py-2 md:px-6 md:py-3 text-sm md:text-base uppercase border-2 border-white neo-brutalism-button-orange">
                    Hire Me
                 </a>
            </div>
        </footer>
    </div>

    <script type="module">
        import { PROJECTS, CONTACT } from './data.js';

        // Set email link
        const emailLink = document.getElementById('email-link');
        emailLink.href = `mailto:${CONTACT.email}`;

        const container = document.getElementById('projects-container');
        const tagsFilter = document.getElementById('tags-filter');
        
        let activeTag = 'ALL';

        // Extract and group tags
        const rawTags = [...new Set(PROJECTS.flatMap(p => p.tags))];
        const categorizedTags = {};
        const uncategorizedTags = [];

        rawTags.forEach(tag => {
            if (tag.includes(':')) {
                const [category, value] = tag.split(':');
                if (!categorizedTags[category]) categorizedTags[category] = [];
                categorizedTags[category].push({ full: tag, display: value });
            } else {
                uncategorizedTags.push({ full: tag, display: tag });
            }
        });

        // Sort tags
        Object.keys(categorizedTags).forEach(cat => categorizedTags[cat].sort((a, b) => a.display.localeCompare(b.display)));
        uncategorizedTags.sort((a, b) => a.display.localeCompare(b.display));

        function renderTags() {
            let html = `
                <div class="flex flex-wrap gap-2 justify-center md:justify-end">
                    <button 
                        class="tag-pill text-xs font-black uppercase border-2 border-white px-3 py-1 bg-black ${activeTag === 'ALL' ? 'active' : ''}"
                        onclick="window.filterByTag('ALL')"
                    >
                        ALL
                    </button>
                </div>
            `;

            // Render categorized groups
            Object.keys(categorizedTags).sort().forEach(category => {
                html += `
                    <div class="flex flex-col items-center md:items-end gap-2">
                        <span class="text-[10px] uppercase opacity-50 font-black tracking-widest">${category}</span>
                        <div class="flex flex-wrap gap-2 justify-center md:justify-end">
                            ${categorizedTags[category].map(tag => `
                                <button 
                                    class="tag-pill text-xs font-black uppercase border-2 border-white px-3 py-1 bg-black ${activeTag === tag.full ? 'active' : ''}"
                                    onclick="window.filterByTag('${tag.full}')"
                                >
                                    ${tag.display}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
            });

            // Render uncategorized group
            if (uncategorizedTags.length > 0) {
                html += `
                    <div class="flex flex-wrap gap-2 justify-center md:justify-end mt-2">
                        ${uncategorizedTags.map(tag => `
                            <button 
                                class="tag-pill text-xs font-black uppercase border-2 border-white px-3 py-1 bg-black ${activeTag === tag.full ? 'active' : ''}"
                                onclick="window.filterByTag('${tag.full}')"
                            >
                                ${tag.display}
                            </button>
                        `).join('')}
                    </div>
                `;
            }

            tagsFilter.innerHTML = html;
        }

        function renderProjects() {
            container.innerHTML = '';
            
            const filtered = activeTag === 'ALL' 
                ? PROJECTS 
                : PROJECTS.filter(p => p.tags.includes(activeTag));

            filtered.forEach(project => {
                const card = document.createElement('div');
                card.className = `bg-black border-4 border-white neo-brutalism-card overflow-hidden group`;
                
                card.innerHTML = `
                    <div class="flex flex-col md:flex-row h-full">
                        <div class="md:w-1/3 bg-zinc-900 border-b-4 md:border-b-0 md:border-r-4 border-white grayscale group-hover:grayscale-0 transition-all">
                            <img src="${project.image}" alt="${project.title}" class="w-full h-full object-cover">
                        </div>
                        <div class="p-8 md:w-2/3 flex flex-col justify-between">
                            <div>
                                <div class="flex flex-wrap gap-2 mb-4">
                                    ${project.tags.map(tag => {
                                        const display = tag.includes(':') ? tag.split(':')[1] : tag;
                                        return `
                                            <span class="text-xs font-black uppercase border-2 border-white px-2 py-0.5 bg-black">
                                                ${display}
                                            </span>
                                        `;
                                    }).join('')}
                                </div>
                                <h3 class="text-3xl md:text-4xl font-black uppercase mb-4 tracking-tight italic">${project.title}</h3>
                                <div class="project-description text-lg opacity-80 leading-relaxed mb-8">
                                    ${project.description.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')}
                                </div>
                            </div>
                            <div>
                                <a href="${project.url}" target="_blank" class="inline-block bg-brand-${project.color} text-black font-black px-6 py-2 md:px-8 md:py-3 text-sm md:text-base uppercase border-2 border-white neo-brutalism-button-orange transition-all hover:bg-white">
                                    View Live →
                                </a>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.filterByTag = (tag) => {
            activeTag = tag;
            renderTags();
            renderProjects();
        };

        renderTags();
        renderProjects();
    </script>
</body>
</html>
